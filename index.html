<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACT Truckers Induction</title>
    <style>
        :root {
            --primary-color: #004a99;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styles */
        header {
            background: white;
            padding: 20px;
            border-bottom: 3px solid var(--primary-color);
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            max-width: 100px;
        }

        .header-date {
            text-align: right;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        /* Navigation/Page Logic */
        .page { display: none; padding: 40px 20px; flex: 1; }
        .active { display: block; }

        /* Buttons Section */
        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .main-btn {
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .main-btn:hover { transform: scale(1.05); }

        /* Form Styles */
        .form-card {
            background: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        h3 { color: var(--primary-color); margin-top: 30px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .referee-box {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 20px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 12px;
        }

        .submit-btn {
            background: #28a745;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="company-name">WACT TRUCKERS</div>
        <img src="YOUR_LOGO_URL_HERE" alt="Logo" class="logo">
    </div>
    <div class="header-date" id="currentDate"></div>
</header>

<div id="page1" class="page active">
    <div class="button-container">
        <button class="main-btn" onclick="showPage('pageNew')">NEW TRUCKERS FORM</button>
        <button class="main-btn" onclick="showPage('pageRenewal')">RENEWAL FORM</button>
    </div>
</div>

<div id="pageNew" class="page">
    <div class="form-card">
        <button onclick="showPage('page1')">← Back</button>
        <h2>NEW TRUCKERS INDUCTION FORM</h2>
        
        <form id="newTruckerForm">
            <h3>BIODATA</h3>
            <div class="form-group">
                <label>FULL NAME (AS SEEN ON DRIVER'S LICENSE)</label>
                <input type="text" name="fullName" placeholder="Enter Full Name" required>
            </div>
            <div class="form-group">
                <label>PRESENT RESIDENTIAL ADDRESS</label>
                <input type="text" name="address" placeholder="Enter Residential Address" required>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>STATE OF ORIGIN</label>
                    <input type="text" name="state" required>
                </div>
                <div class="form-group">
                    <label>LOCAL GOVERNMENT</label>
                    <input type="text" name="lga" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>RELIGION</label>
                    <input type="text" name="religion">
                </div>
                <div class="form-group">
                    <label>MOBILE NUMBER</label>
                    <input type="tel" name="mobile" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>DATE OF BIRTH</label>
                    <input type="date" name="dob" required>
                </div>
                <div class="form-group">
                    <label>MARITAL STATUS</label>
                    <select name="maritalStatus">
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Divorced">Divorced</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>DRIVERS LICENSE NO/ EXP DATE</label>
                    <input type="text" name="licenseDetails" placeholder="ABC12345 / 2026-12-01" required>
                </div>
                <div class="form-group">
                    <label>COMPANY NAME</label>
                    <input type="text" name="companyName" required>
                </div>
            </div>

            <h3>REFEREES (TWO PLACES)</h3>
            <div class="referee-box">
                <label>REFEREE 1 NAME</label>
                <input type="text" name="ref1Name" required>
                <div class="grid">
                    <input type="text" name="ref1Address" placeholder="Address">
                    <input type="text" name="ref1Position" placeholder="Position/Occupation">
                    <input type="text" name="ref1Duration" placeholder="How long known">
                    <input type="text" name="ref1Contact" placeholder="Contact Number">
                </div>
            </div>

            <div class="referee-box">
                <label>REFEREE 2 NAME</label>
                <input type="text" name="ref2Name" required>
                <div class="grid">
                    <input type="text" name="ref2Address" placeholder="Address">
                    <input type="text" name="ref2Position" placeholder="Position/Occupation">
                    <input type="text" name="ref2Duration" placeholder="How long known">
                    <input type="text" name="ref2Contact" placeholder="Contact Number">
                </div>
            </div>

            <div class="form-group">
                <input type="checkbox" id="consent" required style="width: auto;">
                <label style="display: inline;" for="consent"> I confirm that the above details provided are correct and accurate.</label>
            </div>

            <button type="submit" class="submit-btn">SUBMIT FORM</button>
        </form>
    </div>
</div>

<div id="pageRenewal" class="page">
    <div class="form-card">
        <button onclick="showPage('page1')">← Back</button>
        <h2>RENEWAL FORM</h2>
        <p>Renewal form content goes here...</p>
    </div>
</div>

<footer>
    &copy; copyright wacttruckers | classification: confidential
</footer>

<script>
    // Set Date
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString();

    // Page Switching Logic
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // Google Sheets Submission Logic
    const scriptURL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
    const form = document.getElementById('newTruckerForm');

    form.addEventListener('submit', e => {
        e.preventDefault();
        fetch(scriptURL, { method: 'POST', body: new FormData(form)})
          .then(response => alert("Successfully Submitted!"))
          .catch(error => console.error('Error!', error.message));
    });
</script>

</body>
</html>
