<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WACT Truckers Induction</title>
    <style>
        :root {
            --primary-color: #004a99;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header Styles */
        header {
            background: white;
            padding: 20px;
            border-bottom: 3px solid var(--primary-color);
            position: relative;
        }

        .header-top {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .company-name {
            font-size: 24px;
            font-weight: bold;
            color: var(--primary-color);
            text-transform: uppercase;
        }

        .logo {
            position: absolute;
            top: 20px;
            right: 20px;
            max-width: 100px;
        }

        .header-date {
            text-align: right;
            margin-top: 10px;
            font-size: 14px;
            color: #555;
        }

        /* Navigation/Page Logic */
        .page { display: none; padding: 40px 20px; flex: 1; }
        .active { display: block; }

        /* Buttons Section */
        .button-container {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
        }

        .main-btn {
            padding: 20px 40px;
            font-size: 18px;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            transition: transform 0.2s;
        }

        .main-btn:hover { transform: scale(1.05); }

        /* Form Styles */
        .form-card {
            background: white;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h2 { border-bottom: 2px solid var(--primary-color); padding-bottom: 10px; }
        h3 { color: var(--primary-color); margin-top: 30px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; }
        input, select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .referee-box {
            background: #f9f9f9;
            padding: 15px;
            border-left: 4px solid var(--primary-color);
            margin-bottom: 20px;
        }

        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 12px;
        }

        .submit-btn {
            background: #28a745;
            color: white;
            padding: 15px 30px;
            border: none;
            border-radius: 4px;
            width: 100%;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header>
    <div class="header-top">
        <div class="company-name">WEST ARICA CONTAINER TERMINAL EXTERNAL TRUCKERS</div>
        <img src="https://cms-cd.apmterminals.com/onne/-/jssmedia/mainsite/africa-and-middle-east/Onne/Standard-Hero-images/wact-logo-square-400-ext.png?h=432&iar=0&w=420&rev=78b98cae9cdc4b77ac7a0e587a84ae12&hash=3A7E6B6FE98F062F8EDF2EA864706757" alt="Logo" class="logo">
    </div>
    <div class="header-date" id="currentDate"></div>
</header>

<div id="page1" class="page active">
    <div class="button-container">
        <button class="main-btn" onclick="showPage('pageNew')">NEW TRUCKERS FORM</button>
        <button class="main-btn" onclick="showPage('pageRenewal')">RENEWAL FORM</button>
    </div>
</div>

<div id="pageNew" class="page">
    <div class="form-card">
        <button onclick="showPage('page1')">← Back</button>
        <h2>NEW TRUCKERS INDUCTION FORM</h2>
        
        <form id="newTruckerForm">
            <h3>BIODATA</h3>
            <div class="form-group">
                <label>FULL NAME (AS SEEN ON DRIVER'S LICENSE)</label>
                <input type="text" name="fullName" placeholder="Enter Full Name" required>
            </div>
            <div class="form-group">
                <label>PRESENT RESIDENTIAL ADDRESS</label>
                <input type="text" name="address" placeholder="Enter Residential Address" required>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>STATE OF ORIGIN</label>
                    <input type="text" name="state" required>
                </div>
                <div class="form-group">
                    <label>LOCAL GOVERNMENT</label>
                    <input type="text" name="lga" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>RELIGION</label>
                    <input type="text" name="religion">
                </div>
                <div class="form-group">
                    <label>MOBILE NUMBER</label>
                    <input type="tel" name="mobile" required>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>DATE OF BIRTH</label>
                    <input type="date" name="dob" required>
                </div>
                <div class="form-group">
                    <label>MARITAL STATUS</label>
                    <select name="maritalStatus">
                        <option value="Single">Single</option>
                        <option value="Married">Married</option>
                        <option value="Divorced">Divorced</option>
                    </select>
                </div>
            </div>

            <div class="grid">
                <div class="form-group">
                    <label>DRIVERS LICENSE NO/ EXP DATE</label>
                    <input type="text" name="licenseDetails" placeholder="ABC12345 / 2026-12-01" required>
                </div>
                <div class="form-group">
                    <label>COMPANY NAME</label>
                    <input type="text" name="companyName" required>
                </div>
            </div>

            <h3>REFEREES (TWO PLACES)</h3>
            <div class="referee-box">
                <label>REFEREE 1 NAME</label>
                <input type="text" name="ref1Name" required>
                <div class="grid">
                    <input type="text" name="ref1Address" placeholder="Address">
                    <input type="text" name="ref1Position" placeholder="Position/Occupation">
                    <input type="text" name="ref1Duration" placeholder="How long known">
                    <input type="text" name="ref1Contact" placeholder="Contact Number">
                </div>
            </div>

            <div class="referee-box">
                <label>REFEREE 2 NAME</label>
                <input type="text" name="ref2Name" required>
                <div class="grid">
                    <input type="text" name="ref2Address" placeholder="Address">
                    <input type="text" name="ref2Position" placeholder="Position/Occupation">
                    <input type="text" name="ref2Duration" placeholder="How long known">
                    <input type="text" name="ref2Contact" placeholder="Contact Number">
                </div>
            </div>
<h3>DOCUMENT UPLOADS</h3>
<div class="grid">
    <div class="form-group">
        <label>PASSPORT PHOTO (Required)</label>
        <input type="file" id="new_passport" accept="image/*" required>
    </div>
    <div class="form-group">
        <label>DRIVER'S LICENSE (Required)</label>
        <input type="file" id="new_license" accept="image/*,application/pdf" required>
    </div>
</div>
<div class="form-group">
    <label>RECOMMENDATION LETTER (Optional)</label>
    <input type="file" id="new_recLetter" accept="image/*,application/pdf">
</div>

<div id="newFormResponse" style="display:none; padding:15px; border-radius:4px; margin-bottom:15px;"></div>
            
            <div class="form-group">
                <input type="checkbox" id="consent" required style="width: auto;">
                <label style="display: inline;" for="consent"> I confirm that the above details provided are correct and accurate.</label>
            </div>

            <button type="submit" class="submit-btn">SUBMIT FORM</button>
        </form>
    </div>
</div>

<div id="pageRenewal" class="page">
    <div class="form-card">
        <button onclick="showPage('page1')">← Back</button>
        <h2>RENEWAL FORM</h2>

        <div id="searchSection">
            <label>ENTER INDUCTION NUMBER (e.g. SI/EXT/2015/1234)</label>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="searchID" placeholder="Search Full or Partial ID...">
                <button type="button" onclick="searchTrucker()" id="searchBtn">SEARCH</button>
            </div>
            <div id="loading" style="display:none; color: blue; margin-top: 10px;">Searching database...</div>
            <div id="searchResults" style="margin-top: 15px;"></div>
        </div>

        <form id="renewalForm" style="display:none; margin-top: 30px;">
            <hr>
            <h3>VERIFIED INFORMATION (READ-ONLY)</h3>
            <div class="grid">
                <div class="form-group">
                    <label>FULL NAME</label>
                    <input type="text" name="fullName" id="ren_name" readonly style="background: #eee;">
                </div>
                <div class="form-group">
                    <label>INDUCTION NUMBER</label>
                    <input type="text" name="inductionNumber" id="ren_id" readonly style="background: #eee;">
                </div>
            </div>

            <h3>UPDATABLE INFORMATION</h3>
            <div class="form-group">
                <label>PRESENT RESIDENTIAL ADDRESS</label>
                <input type="text" name="address" id="ren_address" required>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>MOBILE NUMBER</label>
                    <input type="tel" name="mobile" id="ren_mobile" required>
                </div>
                <div class="form-group">
                    <label>COMPANY NAME</label>
                    <input type="text" name="companyName" id="ren_company" required>
                </div>
            </div>

            <div class="referee-box">
                <label>WAS INDUCTION CARD SEIZED, SUSPENDED, OR LOST?</label>
                <select name="cardStatus" id="cardStatus" onchange="toggleUploadRequirements()">
                    <option value="No">No (In Possession)</option>
                    <option value="Seized">Yes - Seized</option>
                    <option value="Suspended">Yes - Suspended</option>
                    <option value="Lost">Yes - Lost</option>
                </select>
            </div>

            <h3>DOCUMENT UPLOADS</h3>
            <div class="grid">
                <div class="form-group">
                    <label id="labelOldCard">OLD INDUCTION CARD (Required if in possession)</label>
                    <input type="file" id="file_oldCard" accept="image/*,application/pdf">
                </div>
                <div class="form-group">
                    <label id="labelPolice">POLICE REPORT (Required if Lost)</label>
                    <input type="file" id="file_police" accept="image/*,application/pdf">
                </div>
            </div>
            <div class="grid">
                <div class="form-group">
                    <label>DRIVER'S LICENSE (Required)</label>
                    <input type="file" id="file_license" required>
                </div>
                <div class="form-group">
                    <label>PASSPORT PHOTOGRAPH (Required)</label>
                    <input type="file" id="file_passport" required>
                </div>
            </div>

            <button type="submit" class="submit-btn" id="renSubmitBtn">SUBMIT RENEWAL</button>
        </form>
    </div>
</div>

<footer>
    &copy; copyright wacttruckers | classification: confidential
</footer>

<script>
    // PASTE YOUR NEW URL HERE (Must end in /exec)
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyT9VU1LktpavOtbkIKlsvjWV5_7kx_xctn1dVZS6LtiDQnMAagX4Xk5xC0zH_MhouoBg/exec';

    // Set Date
    document.getElementById('currentDate').innerText = new Date().toLocaleDateString();

    // Page Switching Logic
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // --- NEW TRUCKER FORM SUBMISSION ---
    const newForm = document.getElementById('newTruckerForm');
    newForm.addEventListener('submit', e => {
        e.preventDefault();
        const btn = newForm.querySelector('button[type="submit"]');
        btn.innerText = "SUBMITTING...";
        btn.disabled = true;

        fetch(scriptURL, { method: 'POST', body: new FormData(newForm)})
          .then(response => {
              alert("New Trucker Successfully Submitted!");
              location.reload();
          })
          .catch(error => {
              alert("Error Submitting Form!");
              btn.innerText = "SUBMIT FORM";
              btn.disabled = false;
          });
    });

    // --- SEARCH TRUCKER LOGIC ---
    async function searchTrucker() {
        const id = document.getElementById('searchID').value;
        const resultsDiv = document.getElementById('searchResults');
        const loading = document.getElementById('loading');
        
        if (id.length < 3) return alert("Please enter at least 3 characters");

        loading.style.display = "block";
        resultsDiv.innerHTML = "";

        try {
            const response = await fetch(`${scriptURL}?action=search&inductionNumber=${encodeURIComponent(id)}`);
            const data = await response.json();
            
            loading.style.display = "none";

            if (data.length === 0) {
                resultsDiv.innerHTML = "<p style='color:red;'>Induction number not found. Please check and try again.</p>";
            } else if (data.length === 1) {
                populateRenewalForm(data[0]);
            } else {
                resultsDiv.innerHTML = "<p>Multiple matches found. Please select:</p>";
                data.forEach(item => {
                    const btn = document.createElement('button');
                    btn.innerText = `${item['Full Name']} (${item['Induction Number']})`;
                    btn.className = "main-btn";
                    btn.style.margin = "5px";
                    btn.onclick = () => populateRenewalForm(item);
                    resultsDiv.appendChild(btn);
                });
            }
        } catch (e) {
            console.error(e);
            alert("Error fetching data. Check if your scriptURL is a Web App URL ending in /exec");
            loading.style.display = "none";
        }
    }

    function populateRenewalForm(trucker) {
        document.getElementById('renewalForm').style.display = "block";
        document.getElementById('searchResults').innerHTML = `<p style='color:green;'>Selected: ${trucker['Full Name']}</p>`;
        
        // Mapping keys from your Master Sheet headers
        document.getElementById('ren_name').value = trucker['Full Name'] || "";
        document.getElementById('ren_id').value = trucker['Induction Number'] || "";
        document.getElementById('ren_address').value = trucker['Address'] || "";
        document.getElementById('ren_mobile').value = trucker['Mobile Number'] || "";
        document.getElementById('ren_company').value = trucker['Company Name'] || "";
    }

    function toggleUploadRequirements() {
        const status = document.getElementById('cardStatus').value;
        const oldCard = document.getElementById('file_oldCard');
        const police = document.getElementById('file_police');

        oldCard.required = (status === "No");
        police.required = (status === "Lost");
    }

    // Logic to convert file to Base64 for Google Drive
    async function getFileData(fileInput) {
        const file = fileInput.files[0];
        if (!file) return null;
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.onload = () => resolve({
                base64: reader.result.split(',')[1],
                type: file.type,
                name: file.name
            });
            reader.readAsDataURL(file);
        });
    }

    // --- RENEWAL FINAL SUBMISSION ---
    document.getElementById('renewalForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('renSubmitBtn');
        btn.innerText = "UPLOADING & SAVING...";
        btn.disabled = true;

        const payload = {
            action: 'submitRenewal',
            fullName: document.getElementById('ren_name').value,
            inductionNumber: document.getElementById('ren_id').value,
            address: document.getElementById('ren_address').value,
            mobile: document.getElementById('ren_mobile').value,
            companyName: document.getElementById('ren_company').value,
            cardStatus: document.getElementById('cardStatus').value,
            oldCard: await getFileData(document.getElementById('file_oldCard')),
            policeReport: await getFileData(document.getElementById('file_police')),
            driversLicense: await getFileData(document.getElementById('file_license')),
            passportPhoto: await getFileData(document.getElementById('file_passport'))
        };

        fetch(scriptURL, {
            method: 'POST',
            body: JSON.stringify(payload)
        }).then(() => {
            alert("Renewal Submitted Successfully!");
            location.reload();
        }).catch(err => {
            alert("Error: " + err);
            btn.innerText = "SUBMIT RENEWAL";
            btn.disabled = false;
        });
    });
</script>

</body>
</html>
